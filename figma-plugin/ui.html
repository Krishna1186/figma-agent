<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; }
body { font-family: sans-serif; margin: 0; padding: 12px; background: #f5f5f5; min-width: 300px; }
h2 { font-size: 14px; margin: 0 0 8px; display: flex; justify-content: space-between; align-items: center; }
.msg { background: white; border-radius: 8px; padding: 10px 14px; margin: 6px 0; font-size: 13px; word-break: break-word; }
.user { background: #3b82f6; color: white; text-align: right; }
.error { background: #fee2e2; color: #dc2626; }
#messages { overflow-y: auto; margin-bottom: 12px; transition: height 0.2s; }
#messages.expanded { height: 300px; }
#messages.collapsed { height: 0; overflow: hidden; }
#drop { border: 2px dashed #ccc; border-radius: 8px; padding: 16px; text-align: center; font-size: 13px; color: #666; cursor: pointer; margin-bottom: 8px; }
#drop:hover { border-color: #3b82f6; }
input[type=file] { display: none; }
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
button { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
button.secondary { background: #6b7280; }
button:hover { opacity: 0.9; }
#toggle-btn { background: none; border: none; color: #666; font-size: 18px; cursor: pointer; padding: 0; line-height: 1; }
</style>
</head>
<body>
<h2>
  AI Design Assistant
  <button id="toggle-btn" onclick="toggleMessages()" title="Minimize/Expand">-</button>
</h2>
<div id="messages" class="expanded">
  <div class="msg">Upload a PDF or image to begin decomposition.</div>
</div>
<div id="drop" onclick="document.getElementById('fi').click()">
  Drop PDF/image here or click to upload
</div>
<input type="file" id="fi" accept="image/*,.pdf">
<div class="btn-row">
  <button onclick="document.getElementById('fi').click()">Choose File</button>
  <button class="secondary" onclick="clearMessages()">Clear</button>
</div>

<script>
const msgs = document.getElementById('messages');
let collapsed = false;

function toggleMessages() {
  collapsed = !collapsed;
  msgs.className = collapsed ? 'collapsed' : 'expanded';
  document.getElementById('toggle-btn').textContent = collapsed ? '+' : '-';
}

function clearMessages() {
  msgs.innerHTML = '<div class="msg">Upload a PDF or image to begin decomposition.</div>';
}

function add(text, cls='') {
  if (collapsed) toggleMessages();
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

document.getElementById('fi').addEventListener('change', async () => {
  const file = document.getElementById('fi').files[0];
  if (!file) return;
  add('Uploaded: ' + file.name, 'user');
  add('Uploading and decomposing...');
  try {
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    const res = await fetch('http://localhost:8000/decompose', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({filename: file.name, mime_type: file.type, file_b64: b64})
    });
    if (!res.ok) throw new Error('Server ' + res.status + ': ' + (await res.text()).slice(0,200));
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const compCount = data.components ? data.components.length :
    (data.pages ? data.pages.reduce((s,p)=>s+(p.components||[]).length,0) : 0);
  add('Got ' + compCount + ' components. Rendering...');
    parent.postMessage({pluginMessage: {type: 'render-components', data: data}}, '*');
  } catch(e) {
    add('Error: ' + e.message, 'error');
  }
  document.getElementById('fi').value = '';
});

window.onmessage = e => {
  const m = e.data.pluginMessage;
  if (!m) return;
  if (m.type === 'done') add('Done! Layers created in Figma.');
  if (m.type === 'error') add('Error: ' + m.message, 'error');
};
</script>
</body>
</html>
